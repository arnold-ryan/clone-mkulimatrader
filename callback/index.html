<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signing you in… — Mkulima Trader</title>
<style>
/* Minimal inline styles — no external dependency */
:root {
  --bg:      #0D1B2A;
  --teal:    #1DBDA0;
  --text:    #E8F4F1;
  --text2:   #7A9FB0;
  --border:  rgba(255,255,255,0.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
.box {
  text-align: center;
  max-width: 380px;
  padding: 2rem;
}
.logo-mark {
  width: 52px; height: 52px;
  border-radius: 13px;
  background: var(--teal);
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 20px; color: #0D1B2A;
  margin: 0 auto 1.5rem;
}
.spinner {
  width: 44px; height: 44px;
  border: 3px solid var(--border);
  border-top-color: var(--teal);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 1.25rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
h2 { font-size: 1.15rem; margin-bottom: 0.5rem; }
#status { color: var(--text2); font-size: 0.9rem; margin-bottom: 1.25rem; min-height: 1.2em; }
.btn {
  display: inline-block;
  padding: 10px 22px;
  border-radius: 8px;
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 600;
  border: 1.5px solid var(--teal);
  color: var(--teal);
  background: transparent;
  cursor: pointer;
}
.btn:hover { background: rgba(29,189,160,0.1); }
#retry { display: none; }
</style>
</head>
<body>
<div class="box">
  <div class="logo-mark">MT</div>
  <div class="spinner" id="spinner"></div>
  <h2>One moment…</h2>
  <p id="status">Completing sign in with Deriv</p>
  <a id="retry" href="/" class="btn">← Back to Home</a>
</div>

<script src="../assets/auth.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => MT_AUTH.handleCallback());
</script>
</body>
</html>
